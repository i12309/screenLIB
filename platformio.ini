[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    links2004/WebSockets @ ^2.6.1
    nanopb/Nanopb @ ^0.4.9

build_unflags =
    -std=gnu++11
build_flags =
    -Wall
    -Wextra
    -std=gnu++17

[env:native]
platform = native
test_framework = unity
test_build_src = no

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    nanopb/Nanopb @ ^0.4.9

build_flags =
    -Wall
    -Wextra
    -std=gnu++17
