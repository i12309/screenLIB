syntax = "proto3";

// ============================================================
// machine.proto — протокол обмена между контроллером и экраном.
//
// Направление:
//   Контроллер → Экран : push UI-команды + service request
//   Экран → Контроллер : user events + service response
//
// Один Envelope = одна команда.
//
// Архитектурно:
// - динамическое состояние UI синхронизируется push-командами с backend;
// - service request/response используется для metadata, snapshot и диагностики.
// ============================================================

// Обёртка — всегда передаётся как payload в FrameCodec
message Envelope {
  // Исторически использованные, но удалённые теги в oneof payload.
  // Не переиспользовать во избежание конфликта с клиентами старых версий.
  reserved 2, 3, 4, 5, 6;
  reserved 15, 16, 17, 18;
  reserved 20;
  reserved "set_text", "set_color", "set_visible", "set_value", "set_batch",
           "request_page_state", "page_state",
           "request_element_state", "element_state",
           "set_element_attribute_batch";
  oneof payload {
    ShowPage    show_page    = 1;  // показать страницу
    ButtonEvent button_event = 7;  // нажатие кнопки (экран → контроллер)
    InputEvent  input_event  = 8;  // ввод значения пользователем
    Heartbeat   heartbeat    = 9;  // watchdog / детекция разрыва

    // ---- Service layer (metadata / request-response) ----
    Hello               hello                = 10; // screen client может слать при connect/reconnect
    RequestDeviceInfo   request_device_info  = 11; // backend -> screen
    DeviceInfo          device_info          = 12; // screen -> backend (response или async info)
    RequestCurrentPage  request_current_page = 13; // backend -> screen
    CurrentPage         current_page         = 14; // screen -> backend
    SetElementAttribute      set_element_attribute       = 19; // точечная запись style/layout атрибута
    // reserved: tag 20 (set_element_attribute_batch) — удалён, не переиспользовать.
    RequestElementAttribute  request_element_attribute   = 21; // backend -> screen
    ElementAttributeState    element_attribute_state     = 22; // screen -> backend
    PageSnapshot             page_snapshot               = 23; // screen -> backend (полный слепок страницы)
    AttributeChanged         attribute_changed           = 24; // screen -> backend (дельта + ACK команды)
    TextChunk                text_chunk                  = 25;
    TextChunkAbort           text_chunk_abort            = 26;
  }
}

// ---- Контроллер → Экран ----

// Показать страницу по ID.
// session_id — эпоха навигации, инкрементируется бэком при каждом переходе.
// Все последующие сообщения по этой странице (SetElementAttribute,
// PageSnapshot, AttributeChanged, ButtonEvent, InputEvent) должны нести
// соответствующий session_id. Устаревшие сообщения получатель игнорирует.
message ShowPage {
  uint32 page_id    = 1;
  uint32 session_id = 2;
}






// ---- Typed element attributes ----

// Поддерживаемые атрибуты элемента (точечный set/get).
enum ElementAttribute {
  ELEMENT_ATTRIBUTE_UNKNOWN = 0;
  ELEMENT_ATTRIBUTE_POSITION_WIDTH = 1;
  ELEMENT_ATTRIBUTE_POSITION_HEIGHT = 2;
  ELEMENT_ATTRIBUTE_BACKGROUND_COLOR = 3;
  ELEMENT_ATTRIBUTE_BORDER_COLOR = 4;
  ELEMENT_ATTRIBUTE_BORDER_WIDTH = 5;
  ELEMENT_ATTRIBUTE_TEXT_COLOR = 6;
  ELEMENT_ATTRIBUTE_TEXT_FONT = 7;
  ELEMENT_ATTRIBUTE_VISIBLE = 8;   // bool
  ELEMENT_ATTRIBUTE_TEXT    = 9;   // string
  ELEMENT_ATTRIBUTE_VALUE   = 10;  // int32 (slider/bar/checkbox/switch)
  ELEMENT_ATTRIBUTE_X       = 11;  // int32
  ELEMENT_ATTRIBUTE_Y       = 12;  // int32
}

enum TextChunkKind {
  TEXT_CHUNK_SET_ATTRIBUTE = 0;
  TEXT_CHUNK_INPUT_EVENT = 1;
  TEXT_CHUNK_ATTRIBUTE_CHANGED = 2;
}

enum TextChunkAbortReason {
  TEXT_CHUNK_ABORT_UNKNOWN = 0;
  TEXT_CHUNK_ABORT_TIMEOUT = 1;
  TEXT_CHUNK_ABORT_OVERFLOW = 2;
  TEXT_CHUNK_ABORT_BAD_INDEX = 3;
  TEXT_CHUNK_ABORT_METADATA_CHANGED = 4;
}

message TextChunk {
  uint32 transfer_id = 1;
  uint32 session_id = 2;
  uint32 page_id = 3;
  uint32 element_id = 4;
  ElementAttribute attribute = 5;

  uint32 chunk_index = 6;
  uint32 chunk_count = 7;
  bytes chunk_data = 8;

  uint32 request_id = 9;
  TextChunkKind kind = 10;
}

message TextChunkAbort {
  uint32 transfer_id = 1;
  uint32 request_id = 2;
  TextChunkAbortReason reason = 3;
}

// Типизированный id шрифта для text.font.
enum ElementFont {
  ELEMENT_FONT_UNKNOWN = 0;
  ELEMENT_FONT_UI_M18 = 1;
  ELEMENT_FONT_UI_M20 = 2;
  ELEMENT_FONT_UI_M24 = 3;
  ELEMENT_FONT_UI_M70 = 4;
}

// Точечная запись одного атрибута элемента.
// request_id — для ACK-сопоставления: экран в ответ пришлёт
// AttributeChanged с in_reply_to_request = request_id и reason =
// REASON_COMMAND_APPLIED. 0 означает "без ответа" (fire-and-forget).
// session_id — эпоха страницы. 0 допустим для legacy-совместимости
// (получатель не проверяет).
message SetElementAttribute {
  reserved 9;
  reserved "string_value";
  uint32 element_id = 1;
  ElementAttribute attribute = 2;
  oneof value {
    int32 int_value = 3;
    uint32 color_value = 4; // RGB888
    ElementFont font_value = 5;
    bool bool_value = 8;
  }
  uint32 request_id = 6;
  uint32 session_id = 7;
}

// Причина изменения атрибута в AttributeChanged (экран → бэк).
enum AttributeChangeReason {
  REASON_UNKNOWN         = 0;
  REASON_COMMAND_APPLIED = 1;  // ACK на SetElementAttribute
  REASON_LAYOUT          = 2;  // LVGL сам пересчитал layout
  REASON_USER_INPUT      = 3;  // пользователь ввёл/изменил
  REASON_ANIMATION       = 4;  // итог анимации
}

// Универсальное значение одного атрибута.
// Переиспользуется в PageSnapshot и AttributeChanged как кирпичик.
message ElementAttributeValue {
  ElementAttribute attribute = 1;
  oneof value {
    int32       int_value    = 2;
    uint32      color_value  = 3;  // RGB888
    ElementFont font_value   = 4;
    bool        bool_value   = 5;
    string      string_value = 6;
  }
}

// Снимок состояния одного элемента в рамках PageSnapshot.
message ElementSnapshot {
  uint32 element_id = 1;
  repeated ElementAttributeValue attributes = 2;
}

// Полный снимок состояния страницы (экран → бэк).
// Отправляется экраном в ответ на ShowPage с тем же session_id.
// Бэк применяет snapshot как каноничное состояние страницы.
message PageSnapshot {
  uint32 session_id = 1;
  uint32 page_id    = 2;
  repeated ElementSnapshot elements = 3;
}

// Точечная дельта изменения атрибута (экран → бэк).
// Используется и как ACK команды (reason = REASON_COMMAND_APPLIED,
// in_reply_to_request = request_id из SetElementAttribute),
// и как спонтанное сообщение о layout/user input (in_reply_to_request = 0).
message AttributeChanged {
  uint32 session_id           = 1;
  uint32 page_id              = 2;
  uint32 element_id           = 3;
  ElementAttributeValue value = 4;
  AttributeChangeReason reason = 5;
  uint32 in_reply_to_request  = 6;  // 0 если спонтанно
}

// ---- Экран → Контроллер ----

// Тип кнопочного события.
enum ButtonAction {
  CLICK  = 0;
  PUSH   = 1;
  POP    = 2;
  REPEAT = 3;
}

// Нажатие кнопки или другого интерактивного элемента.
// session_id — эпоха страницы на момент события. Бэк игнорирует,
// если уже перешёл на следующую страницу.
message ButtonEvent {
  uint32 element_id = 1;
  uint32 page_id    = 2;  // с какой страницы пришло событие
  ButtonAction action = 3;
  uint32 session_id = 4;
}

// Ввод данных пользователем (числовой input, поле текста).
// session_id — эпоха страницы на момент события.
message InputEvent {
  reserved 4;
  reserved "string_value";
  uint32 element_id = 1;
  uint32 page_id    = 2;
  oneof value {
    int32  int_value    = 3;
  }
  uint32 session_id = 5;
}

// Heartbeat — обе стороны шлют периодически для контроля связи
message Heartbeat {
  uint32 uptime_ms = 1;  // время работы отправителя в мс
}

// ---- Service layer: metadata / request-response ----




// Идентификация и capability screen client.
message DeviceInfo {
  uint32 protocol_version = 1;
  string fw_version       = 2;
  string ui_version       = 3;
  string screen_type      = 4;
  string client_type      = 5;
  string device_id        = 6;
  string instance_id      = 7;
  uint32 capabilities     = 8; // bit flags
}

// Асинхронное приветствие screen client (например, после reconnect).
message Hello {
  DeviceInfo device_info = 1;
}

message RequestDeviceInfo {
  uint32 request_id = 1;
}

message RequestCurrentPage {
  uint32 request_id = 1;
}

message CurrentPage {
  uint32 request_id = 1;
  uint32 page_id    = 2;
}





// Запрос одного точечного атрибута элемента.
message RequestElementAttribute {
  uint32 request_id = 1;
  uint32 page_id    = 2;
  uint32 element_id = 3;
  ElementAttribute attribute = 4;
}

// Ответ со значением одного атрибута элемента.
message ElementAttributeState {
  uint32 request_id = 1;
  uint32 page_id    = 2;
  uint32 element_id = 3;
  ElementAttribute attribute = 4;
  bool found = 5;
  oneof value {
    int32 int_value = 6;
    uint32 color_value = 7; // RGB888
    ElementFont font_value = 8;
  }
}
